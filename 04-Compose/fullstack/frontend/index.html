<!DOCTYPE html>
<html>
<head>
    <title>TechFlow App</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
        #result { margin-top: 20px; padding: 20px; background: #f0f0f0; border-radius: 8px; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>TechFlow Full Stack Application</h1>
    <button onclick="checkHealth()">Check API Health</button>
    <button onclick="getUsers()">Get Users</button>
    <div id="result">Click a button to test the API...</div>

    <script>
        const API_URL = 'http://localhost:5001';

        async function checkHealth() {
            try {
                const res = await fetch(`${API_URL}/api/health`);
                const data = await res.json();
                document.getElementById('result').innerHTML =
                    `<strong>Status:</strong> ${data.status}<br>
                     <strong>Time:</strong> ${data.timestamp}`;
            } catch (err) {
                document.getElementById('result').innerHTML = `<strong>Error:</strong> ${err.message}`;
            }
        }

        async function getUsers() {
            try {
                const res = await fetch(`${API_URL}/api/users`);
                const data = await res.json();
                document.getElementById('result').innerHTML =
                    `<strong>Users:</strong><pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (err) {
                document.getElementById('result').innerHTML = `<strong>Error:</strong> ${err.message}`;
            }
        }
    </script>
</body>
</html>
