services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: kampus-db
    restart: always
    environment:
      POSTGRES_USER: kampus
      POSTGRES_PASSWORD: kampus123
      POSTGRES_DB: kampusdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kampus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kampus-api
    restart: always
    ports:
      - "40501:5000"
    environment:
      DB_HOST: db
      DB_USER: kampus
      DB_PASS: kampus123
      DB_NAME: kampusdb
      NODE_ENV: production
    networks:
      - backend-network
      - frontend-network
    depends_on:
      db:
        condition: service_healthy

  # Frontend (Nginx)
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kampus-web
    restart: always
    ports:
      - "40081:80"
    networks:
      - frontend-network
    depends_on:
      - api

volumes:
  postgres_data:

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge
